version: '3.8'

services:
  qwen-72b:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen-72b
    # runtime: nvidia # 如果在 Linux 宿主机上，且没有使用 Docker Desktop，可以取消注释此行
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - /data/models:/root/.cache/huggingface
    ports:
      - "8000:8000"
    ipc: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model Qwen/Qwen2.5-72B-Instruct-AWQ
      --quantization awq
      --tensor-parallel-size 2
      --max-model-len 16384
      --gpu-memory-utilization 0.90
      --enable-prefix-caching
      --trust-remote-code
      --port 8000

  bge-embeddings:
    image: vllm/vllm-openai:latest
    container_name: vllm-bge-embeddings
    # runtime: nvidia # 如果在 Linux 宿主机上，且没有使用 Docker Desktop，可以取消注释此行
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - /data/models:/root/.cache/huggingface
    ports:
      - "8001:8001"
    ipc: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model BAAI/bge-large-zh-v1.5
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.20
      --trust-remote-code
      --port 8001
