services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-agent_db}
    volumes:
      - myagent_postgres_data:/var/lib/postgresql/data
    networks:
      - dawnai_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  myagent:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
    env_file:
      - .env.production
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_TYPE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-agent_db}
      CHROMA_DIR: /app/chroma_db
      MYAGENT_DATA_DIR: /var/lib/myagent
      XHS_PROFILE_DIR: /var/lib/myagent/xhs-playwright-profile
      XHS_ASSET_DIR: /var/lib/myagent/xhs-assets
    expose:
      - "8080"
    volumes:
      - myagent_chroma_data:/app/chroma_db
      - myagent_runtime_data:/var/lib/myagent
    networks:
      dawnai_internal:
        aliases:
          - myagent
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  myagent_postgres_data:
  myagent_chroma_data:
  myagent_runtime_data:

networks:
  dawnai_internal:
    name: ${MYAGENT_DOCKER_NETWORK:-dawnai_internal}
